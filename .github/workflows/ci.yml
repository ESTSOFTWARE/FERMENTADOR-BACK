name: CI

on:
  push:
    branches:
      - master
      - main
      - "feat/**"
      - "fix/**"
      - "refactor/**"
  pull_request:
    branches:
      - master
      - main

jobs:

  lint:
    name: Lint API (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check api/

  test:
    name: Build & Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      SECRET_KEY: ci-only-secret-key
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: test_db
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  ws-service:
    name: Typecheck WS service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ws-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ws-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t fermentador-api:ci ./api

      - name: Build WS image
        run: docker build -t fermentador-ws:ci ./ws-service
