# ── API Gateway (Nich-Ká) ────────────────────────────────────────────────────
# Único punto de entrada. Enruta por prefijo de path:
#   /ws/*  → ws-service (Node, WebSocket en tiempo real)
#   /*     → api (Python/FastAPI: negocio, REST, ML/NLP)
# El front le pega a un solo host; no distingue qué servicio responde detrás.

events {
    worker_connections 1024;
}

http {
    # DNS interno de Docker: resuelve los nombres de servicio en cada request,
    # así nginx no se cae al arrancar si un upstream aún no está listo y tolera
    # que un contenedor cambie de IP al reiniciarse.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Mapa para el header Connection del upgrade WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;

        # Tamaño de subida (adjuntos del chat, etc.)
        client_max_body_size 30m;

        location /ws/ {
            set $ws_upstream ws-service:8003;
            proxy_pass http://$ws_upstream$request_uri;
            proxy_http_version 1.1;

            # Handshake de upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Conexiones largas: no cerrar el socket por inactividad
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        location / {
            set $api_upstream api:8000;
            proxy_pass http://$api_upstream$request_uri;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
