# API Gateway (Nich-Ká) — para deploy (Railway)
# Único punto de entrada. El front le pega solo a este gateway (api.nich-ka.space).
#   /ws/*  → ws-service (Node)
#   /*     → api (Python)
#
# Apunta a las URLs PÚBLICAS de tus servicios en Railway (HTTPS). Despliega
# primero api y ws-service, copia sus dominios *.up.railway.app y reemplaza
# REEMPLAZA_URL_WS y REEMPLAZA_URL_API abajo (en los DOS lugares de cada uno).

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8000;

        client_max_body_size 30m;

        # WebSocket → ws-service (Node)
        location /ws/ {
            proxy_pass https://REEMPLAZA_URL_WS;          # ej. nichka-ws-production.up.railway.app
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       REEMPLAZA_URL_WS;  # mismo dominio de arriba

            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # Todo lo demás → api (Python)
        location / {
            proxy_pass https://REEMPLAZA_URL_API;         # ej. nichka-api-production.up.railway.app
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            proxy_set_header Host              REEMPLAZA_URL_API;  # mismo dominio de arriba
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
