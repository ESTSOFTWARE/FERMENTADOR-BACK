events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8000;

        client_max_body_size 30m;

        # WebSocket → ws-service (Node)
        location /ws/ {
            proxy_pass https://websockets-production-991f.up.railway.app;         
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       websockets-production-991f.up.railway.app; 

            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # Todo lo demás → api (Python)
        location / {
            proxy_pass https://fermentador-back-production.up.railway.app;         
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            proxy_set_header Host              fermentador-back-production.up.railway.app;  
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
