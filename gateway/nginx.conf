# ── API Gateway (Nich-Ká) ────────────────────────────────────────────────────
# Único punto de entrada. Enruta por prefijo de path:
#   /ws/*  → ws-service (Node, :8003)
#   /*     → api (Python/FastAPI, :8001)
# Con network_mode: host, todo vive en localhost; el front le pega a :8000.

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8000;

        # Tamaño de subida (adjuntos del chat, etc.)
        client_max_body_size 30m;

        # ── WebSocket → Node ──────────────────────────────────────────────────
        location /ws/ {
            proxy_pass http://127.0.0.1:8003;
            proxy_http_version 1.1;

            # Handshake de upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Conexiones largas: no cerrar el socket por inactividad
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Todo lo demás → Python API ────────────────────────────────────────
        location / {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
