services:

  # ── API Gateway (Nginx) — único punto de entrada ────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: sensor_gateway
    restart: always
    ports:
      - "8000:80"            # el front le pega aquí (mismo puerto de siempre)
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ws-service
    networks:
      - sensor_network

  # ── API de negocio + ML/NLP (Python / FastAPI) ──────────────────────────────
  api:
    build: ./api
    container_name: sensor_api
    restart: always
    ports:
      - "8001:8000"          # acceso directo para debug; el tráfico real entra por el gateway
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    environment:
      DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: sh -c "sleep 15 && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - sensor_network

  # ── Servicio WebSocket en tiempo real (Node / TypeScript) ───────────────────
  ws-service:
    build: ./ws-service
    container_name: sensor_ws
    restart: always
    ports:
      - "8003:8003"
    env_file:
      - ./ws-service/.env
    environment:
      DB_HOST: postgres
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sensor_network

  # ── PostgreSQL (compartida) ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sensor_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sensor_network

  # ── RabbitMQ (bus de eventos entre api y ws-service) ────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sensor_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sensor_network

  adminer:
    image: adminer
    container_name: sensor_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sensor_network

volumes:
  postgres_data:

networks:
  sensor_network:
    driver: bridge
