[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".venv",
    "__pycache__",
    "alembic",
]

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes (bugs reales), I = isort
select = ["E", "F", "I"]
ignore = [
    "E501",  # line too long — controlado por el formatter
    "E402",  # module-level import not at top — usado en main.py (lazy imports)
    "F401",  # unused import — algunos __init__.py re-exportan símbolos
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
